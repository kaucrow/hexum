name: Build and Deploy

on:
  push:
    branches: [ main ]  # Triggers on every push to the main branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hexum:latest

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Runs the Dockerfile using GitHub's servers
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create App Directory on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ~/hexum

      - name: Copy app docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/hexum/"

      - name: Copy traefik docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "ops/traefik/docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/traefik/"
          strip_components: 2   # Strips 'ops/traefik' from the path, so the file lands as ~/traefik/docker-compose.yml

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            # =========================
            #   Traefik Guard Check
            # =========================
            # Check if a container named 'traefik' is running
            if [ -z "$(docker ps -q -f name=^traefik$ -f status=running)" ]; then
              echo "Traefik is NOT active! Initializing gateway network and container..."

              # Ensure the external web-network exists
              docker network create web-network || true

              # Boot up Traefik
              cd ~/traefik
              docker compose up -d
              echo "Traefik container started successfully."
            else
              echo "Traefik container is already running. Skipping initialization."
            fi

            # =========================
            #   App Deployment
            # =========================
            # Move to the app's directory
            cd ~/hexum

            # Log into GHCR on the VPS so it's authorized to pull the image
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the brand new image and restart the containers
            docker compose pull
            docker compose up -d

            # Clean up old images to save space
            docker system prune -f