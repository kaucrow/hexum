name: Build and Deploy

on:
  push:
    branches:
      - main          # Triggers on every push to main
      - 'business-*'  # Triggers on every business implementation

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/hexum:${{ github.ref_name }}

jobs:
  # ============================================================
  #  Run Unit Tests & Integration Tests
  # ============================================================
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: hexum
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hexum_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 10
        command: redis-server --requirepass redis
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      # Run Unit Tests
      - name: Run unit tests
        run: cargo nextest run -p platform --lib --junit junit-unit.xml

      # Run Integration Tests
      - name: Run integration tests
        run: cargo nextest run -p integration-tests --junit junit-integration.xml

      # Generate and publish a test results badge to a Gist
      - name: Generate and publish tests badge
        if: always() 
        uses: gaelgirodon/ci-badges-action@v1
        with:
          gist-id: 5ede7a8ee0dee36b052f2b085c8f0270
          token: ${{ secrets.GIST_TOKEN }}

  # ============================================================
  #  Build with the Dockerfile & push the container
  # ============================================================
  build-and-push:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Runs the Dockerfile using GitHub's servers
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  #  Deploy to VPS
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Determine Project Slug
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          # If the branch name is 'main', the project slug is 'hexum'
          if [ "$BRANCH_NAME" == "main" ]; then
            echo "PROJECT_SLUG=hexum" >> $GITHUB_ENV
          else
            # Strips "business-" from the start of the branch name
            SLUG=${BRANCH_NAME#business-}
            echo "PROJECT_SLUG=$SLUG" >> $GITHUB_ENV
          fi

      - name: Create App Directory on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ~/hexum/${{ env.PROJECT_SLUG }}

      - name: Copy app docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/hexum/${{ env.PROJECT_SLUG }}"

      - name: Copy traefik docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "ops/traefik/docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/traefik/"
          strip_components: 2   # Strips 'ops/traefik' from the path, so the file lands as ~/traefik/docker-compose.yml

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REF_NAME, PROJECT_SLUG
          script: |
            # =========================
            #   Traefik Guard Check
            # =========================
            # Check if a container named 'traefik' is running
            if [ -z "$(docker ps -q -f name=^traefik$ -f status=running)" ]; then
              echo "Traefik is NOT active! Initializing gateway network and container..."

              # Ensure the external web-network exists
              docker network create web-network || true

              # Boot up Traefik
              cd ~/traefik
              docker compose up -d
              echo "Traefik container started successfully."
            else
              echo "Traefik container is already running. Skipping initialization."
            fi

            # =========================
            #   App Deployment
            # =========================
            # Move to the app's directory
            cd ~/hexum/${PROJECT_SLUG}

            # Ensure .env exists
            touch .env

            # Delete any existing lines that start with BUSINESS_NAME= or IMAGE_TAG=
            sed -i '/^BUSINESS_NAME=/d' .env
            sed -i '/^IMAGE_TAG=/d' .env

            # Append BUSINESS_NAME & IMAGE_TAG
            echo "BUSINESS_NAME=${PROJECT_SLUG}" >> .env
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> .env

            # Append database secrets only if they don't exist yet
            if ! grep -q "^DB_PASSWORD=" .env; then
              echo "DB_USER=${{ secrets.DB_USER }}" >> .env
              echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
              echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
              echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
            fi

            # Log into GHCR on the VPS so it's authorized to pull the image
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the brand new image and restart the containers
            docker compose pull
            docker compose -p ${PROJECT_SLUG} up -d

            # Clean up old images to save space
            docker system prune -f