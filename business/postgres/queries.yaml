base:
  ping: |
    SELECT 1 as value

data_ingestion:
  sync_recipes: |
    INSERT INTO recipe.recipe (
    id,
    external_id,
    recipe_name,
    recipe_description,
    instructions,
    thumbnail_url,
    video_url
    )
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &recipe_ids
        $2::int[],       -- &external_ids
        $3::varchar[],   -- &names
        $4::text[],      -- &descriptions
        $5::text[],      -- &instructions
        $6::text[],      -- &thumbnails as &[Option<String>]
        $7::text[]       -- &videos as &[Option<String>]
    )
    ON CONFLICT (external_id)
    DO UPDATE SET
        recipe_name = EXCLUDED.recipe_name,
        recipe_description = EXCLUDED.recipe_description,
        instructions = EXCLUDED.instructions,
        thumbnail_url = EXCLUDED.thumbnail_url,
        video_url = EXCLUDED.video_url
    RETURNING id, external_id

  sync_tags: |
    INSERT INTO recipe.recipe_tag (id, recipe_id, tag_name)
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &tag_ids
        $2::uuid[],      -- &tag_recipe_ids
        $3::varchar[]    -- &tag_names
    )
    ON CONFLICT (recipe_id, tag_name)
    DO NOTHING

  sync_ingredients: |
    INSERT INTO recipe.recipe_ingredient (id, recipe_id, ingredient_name, measure)
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &ing_ids
        $2::uuid[],      -- &ing_recipe_ids (Corrected UUIDs)
        $3::varchar[],   -- &ing_names
        $4::varchar[]    -- &ing_measures
    )
    ON CONFLICT (recipe_id, ingredient_name)
    DO UPDATE SET measure = EXCLUDED.measure

recipe:
  get_search_ids_by_query: |
    SELECT id
    FROM recipe.recipe r
    WHERE r.recipe_name % $1
    ORDER BY similarity(r.recipe_name, $1) DESC, id ASC

  get_search_ids_by_query_ilike: |
    SELECT id
    FROM recipe.recipe r
    WHERE r.recipe_name ILIKE '%' || $1 || '%'
    ORDER BY similarity(r.recipe_name, $1) DESC, id ASC

  get_search_ids_by_tags: |
    SELECT r.id
    FROM recipe.recipe r
    JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE LOWER(rt.tag_name) = ANY($1)
    GROUP BY r.id
    HAVING COUNT(DISTINCT rt.tag_name) = array_length($1, 1)
    ORDER BY r.id ASC

  get_search_ids_by_query_and_tags: |
    SELECT r.id
    FROM recipe.recipe r
    JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE r.recipe_name % $1
      AND LOWER(rt.tag_name) = ANY($2)
    GROUP BY r.id
    HAVING COUNT(DISTINCT rt.tag_name) = array_length($2, 1)
    ORDER BY similarity(r.recipe_name, $1) DESC, r.id ASC

  get_search_ids_by_query_and_tags_ilike: |
    SELECT r.id
    FROM recipe.recipe r
    JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE r.recipe_name ILIKE '%' || $1 || '%'
      AND LOWER(rt.tag_name) = ANY($2)
    GROUP BY r.id
    HAVING COUNT(DISTINCT rt.tag_name) = array_length($2, 1)
    ORDER BY similarity(r.recipe_name, $1) DESC, r.id ASC

  get_previews_by_id: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE r.id = ANY($1)
    GROUP BY r.id

  get_random_previews: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    GROUP BY r.id
    ORDER BY RANDOM()
    LIMIT $1

  get_latest_previews: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    GROUP BY r.id
    ORDER BY r.created_at DESC
    LIMIT $1

  get_previews_by_tag_name: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt2.tag_name) FILTER (WHERE rt2.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    LEFT JOIN recipe.recipe_tag rt2 ON r.id = rt2.recipe_id
    WHERE LOWER(rt.tag_name) = LOWER($1)
    GROUP BY r.id
    ORDER BY r.created_at DESC
    LIMIT $2

  get_by_id: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.recipe_description,
      r.instructions,
      r.thumbnail_url,
      r.video_url,
      r.created_by,
      -- Maps tags to a Vec --
      COALESCE(
        jsonb_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        '[]'::jsonb
      ) AS tags,
      -- Maps ingredients to a BTreeMap --
      COALESCE(
        jsonb_object_agg(ri.ingredient_name, ri.measure) FILTER (WHERE ri.ingredient_name IS NOT NULL),
        '{}'::jsonb
      ) AS ingredients
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    LEFT JOIN recipe.recipe_ingredient ri ON r.id = ri.recipe_id
    WHERE r.id = $1
    GROUP BY r.id

  create: |
    INSERT INTO recipe.recipe (id, recipe_name, recipe_description, instructions, thumbnail_url, created_by)
    VALUES ($1, $2, $3, $4, $5, $6)

  batch_insert_tags: |
    INSERT INTO recipe.recipe_tag (id, recipe_id, tag_name)
    SELECT * FROM UNNEST($1::uuid[], $2::uuid[], $3::varchar[])

  batch_insert_ingredients: |
    INSERT INTO recipe.recipe_ingredient (id, recipe_id, ingredient_name, measure)
    SELECT * FROM UNNEST($1::uuid[], $2::uuid[], $3::varchar[], $4::varchar[])

  get_latest_history_by_user_id: |
    WITH recent_history AS (
      -- Grab the latest unique recipes viewed by the user --
      SELECT
        h.recipe_id,
        MAX(h.viewed_at) AS last_viewed_at
      FROM recipe.history h
      WHERE h.user_id = $1
      GROUP BY h.recipe_id
      ORDER BY last_viewed_at DESC
      LIMIT $2 OFFSET $3
    )
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recent_history rh
    JOIN recipe.recipe r ON rh.recipe_id = r.id
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    GROUP BY
      r.id,
      r.external_id,
      r.recipe_name,
      r.thumbnail_url,
      rh.last_viewed_at
    ORDER BY rh.last_viewed_at DESC

  record_history: |
    INSERT INTO recipe.history (user_id, recipe_id)
    VALUES ($1, $2)
    ON CONFLICT (user_id, recipe_id)
    DO UPDATE SET viewed_at = NOW()

tag:
  get_search_matches: |
    SELECT tag_name AS name
    FROM recipe.v_all_tags t
    WHERE t.tag_name ILIKE $1 || '%'
    ORDER BY similarity(t.tag_name, $1) DESC, t.tag_name ASC
    LIMIT $2

  get_top_tag_names: |
    SELECT TRIM(rt.tag_name) AS name
    FROM recipe.recipe_tag rt
    GROUP BY TRIM(rt.tag_name)
    ORDER BY COUNT(DISTINCT rt.recipe_id) DESC
    LIMIT $1

group:
  get_by_id: |
    SELECT id, group_name, group_description, created_by
    FROM recipe.group
    WHERE id = $1

  get_with_latest_recipes_by_user_id: |
    SELECT
      g.id AS group_id,
      g.group_name,
      COALESCE(recipes_json.recipes, '[]'::json) AS recipes
    FROM recipe.group g
    LEFT JOIN LATERAL (
      -- Aggregates the pre-sorted, pre-limited rows into a JSON array --
      SELECT json_agg(json_build_object(
        'id', limited_recipes.id,
        'recipe_name', limited_recipes.recipe_name,
        'thumbnail_url', limited_recipes.thumbnail_url,
        'origin', CASE WHEN limited_recipes.external_id IS NULL THEN 'local' ELSE 'external' END,
        'tags', COALESCE(tags_json.tags, ARRAY[]::varchar[])
      )) AS recipes
      FROM (
        -- Fetches, sorts, and limits the raw rows --
        SELECT r.id, r.recipe_name, r.thumbnail_url, r.external_id, r.created_at
        FROM recipe.group_recipe gr
        JOIN recipe.recipe r ON r.id = gr.recipe_id
        WHERE gr.group_id = g.id
        ORDER BY r.created_at DESC
        LIMIT $3
      ) limited_recipes
      -- Gathers the tags ONLY for the winning limited recipes --
      LEFT JOIN LATERAL (
        SELECT array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL) AS tags
        FROM recipe.recipe_tag rt
        WHERE rt.recipe_id = limited_recipes.id
      ) tags_json ON true
    ) recipes_json ON true
    WHERE g.created_by = $1
    ORDER BY g.id ASC
    LIMIT $2

  get_recipes_by_group_id: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    JOIN recipe.group_recipe gr ON r.id = gr.recipe_id
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE gr.group_id = $1
    GROUP BY r.id
    ORDER BY r.created_at DESC
    -- PAGINATION --
    LIMIT $2 OFFSET $3

  get_by_user_id: |
    SELECT id, group_name, group_description, created_by
    FROM recipe.group
    WHERE created_by = $1
    ORDER BY group_name DESC

  create: |
    INSERT INTO recipe.group (id, group_name, group_description, created_by)
    VALUES ($1, $2, $3, $4)
    RETURNING id

  delete: |
    WITH target_group AS (
      DELETE FROM recipe.group
      WHERE id = $1 AND created_by = $2
      RETURNING id
    ),
    recipes_to_delete AS (
      SELECT gr.recipe_id
      FROM recipe.group_recipe gr
      JOIN recipe.recipe r ON gr.recipe_id = r.id
      WHERE gr.group_id = (SELECT id FROM target_group)
        AND r.created_by = $2
    ),
    delete_recipes AS (
        DELETE FROM recipe.recipe
        WHERE id IN (SELECT recipe_id FROM recipes_to_delete)
    )
    SELECT id AS deleted_group_id FROM target_group

  add_recipe: |
    INSERT INTO recipe.group_recipe (group_id, recipe_id)
    VALUES ($1, $2)

  delete_recipe: |
    DELETE FROM recipe.group_recipe
    WHERE group_id = $1 AND recipe_id = $2