base:
  ping: |
    SELECT 1 as value

data_ingestion:
  sync_recipes: |
    INSERT INTO recipe.recipe (
    id,
    external_id,
    recipe_name,
    recipe_description,
    instructions,
    thumbnail_url,
    video_url
    )
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &recipe_ids
        $2::int[],       -- &external_ids
        $3::varchar[],   -- &names
        $4::text[],      -- &descriptions
        $5::text[],      -- &instructions
        $6::text[],      -- &thumbnails as &[Option<String>]
        $7::text[]       -- &videos as &[Option<String>]
    )
    ON CONFLICT (external_id)
    DO UPDATE SET
        recipe_name = EXCLUDED.recipe_name,
        recipe_description = EXCLUDED.recipe_description,
        instructions = EXCLUDED.instructions,
        thumbnail_url = EXCLUDED.thumbnail_url,
        video_url = EXCLUDED.video_url
    RETURNING id, external_id

  sync_tags: |
    INSERT INTO recipe.recipe_tag (id, recipe_id, tag_name)
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &tag_ids
        $2::uuid[],      -- &tag_recipe_ids
        $3::varchar[]    -- &tag_names
    )
    ON CONFLICT (recipe_id, tag_name)
    DO NOTHING

  sync_ingredients: |
    INSERT INTO recipe.recipe_ingredient (id, recipe_id, ingredient_name, measure)
    SELECT * FROM UNNEST(
        $1::uuid[],      -- &ing_ids
        $2::uuid[],      -- &ing_recipe_ids (Corrected UUIDs)
        $3::varchar[],   -- &ing_names
        $4::varchar[]    -- &ing_measures
    )
    ON CONFLICT (recipe_id, ingredient_name)
    DO UPDATE SET measure = EXCLUDED.measure

recipe:
  get_search_ids: |
    SELECT id
    FROM recipe.recipe r
    WHERE r.recipe_name % $1
    ORDER BY similarity(r.recipe_name, $1) DESC, id ASC

  get_search_ids_ilike: |
    SELECT id
    FROM recipe.recipe r
    WHERE r.recipe_name ILIKE '%' || $1 || '%'
    ORDER BY similarity(r.recipe_name, $1) DESC, id ASC

  get_search_results_by_id: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.thumbnail_url,
      COALESCE(
        array_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        ARRAY[]::varchar[]
      ) AS tags
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    WHERE r.id = ANY($1)
    GROUP BY r.id

  get_by_id: |
    SELECT
      r.id,
      CASE
        WHEN r.external_id IS NULL THEN 'local'
        ELSE 'external'
      END AS origin,
      r.recipe_name,
      r.recipe_description,
      r.instructions,
      r.thumbnail_url,
      r.video_url,
      -- Maps tags to a Vec --
      COALESCE(
        jsonb_agg(DISTINCT rt.tag_name) FILTER (WHERE rt.tag_name IS NOT NULL),
        '[]'::jsonb
      ) AS tags,
      -- Maps ingredients to a BTreeMap --
      COALESCE(
        jsonb_object_agg(ri.ingredient_name, ri.measure) FILTER (WHERE ri.ingredient_name IS NOT NULL),
        '{}'::jsonb
      ) AS ingredients
    FROM recipe.recipe r
    LEFT JOIN recipe.recipe_tag rt ON r.id = rt.recipe_id
    LEFT JOIN recipe.recipe_ingredient ri ON r.id = ri.recipe_id
    WHERE r.id = $1
    GROUP BY r.id

tag:
  get_search_matches: |
    SELECT tag_name AS name
    FROM recipe.v_all_tags t
    WHERE t.tag_name ILIKE $1 || '%'
    ORDER BY similarity(t.tag_name, $1) DESC, t.tag_name ASC
    LIMIT $2