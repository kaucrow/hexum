# ==============================================
#  HEXUM PRODUCTION APP STACK
#  - API Service (Binds Traefik routing -> App)
#  - Postgres Database
#  - Redis Cache
# ==============================================

services:
  api:
    # Pulls the branch name as the image tag
    image: ghcr.io/kaucrow/hexum:${IMAGE_TAG}
    # Prefix containers with the business name
    container_name: ${BUSINESS_NAME}-api-1
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - web-network       # For Traefik
      - internal-network  # For internal communication
    volumes:
      - ./config/production:/app/config/production:ro
      - uploads:/app/uploads
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: 5
    environment:
      - APP_ENV=production
    labels:
      # Expose this container
      - "traefik.enable=true"

      # Catch every request that starts with /api
      - "traefik.http.routers.${BUSINESS_NAME}-api.rule=Host(`${BUSINESS_NAME}.kaucrow.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${BUSINESS_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${BUSINESS_NAME}-api.tls=true"
      - "traefik.http.routers.${BUSINESS_NAME}-api.tls.certresolver=certresolver"

      # Strip "/api" off the front of every path
      - "traefik.http.middlewares.${BUSINESS_NAME}-api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.${BUSINESS_NAME}-api.middlewares=${BUSINESS_NAME}-api-strip"

      # Forward the stripped request to the app port
      - "traefik.http.services.${BUSINESS_NAME}-api.loadbalancer.server.port=8080"

  postgres:
    image: postgres:18-alpine
    container_name: ${BUSINESS_NAME}-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal-network

  redis:
    image: redis:alpine
    container_name: ${BUSINESS_NAME}-redis-1
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - internal-network

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  web-network:
    external: true  # Use the Traefik bridge
  internal-network:
    driver: bridge  # Private local virtual network bridge