# ==============================================
#  HEXUM PRODUCTION APP STACK
#  - API Service (Binds Traefik routing -> App)
#  - Postgres Database
#  - Redis Cache
# ==============================================

services:
  api:
    image: ghcr.io/kaucrow/hexum:latest
    container_name: hexum-api-1
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    networks:
      - web-network       # For Traefik
      - internal-network  # For internal communication
    volumes:
      - /home/kaucrow/hexum/config/production:/app/config/production:ro
    environment:
      - APP_ENV=production
    labels:
      # Expose this container
      - "traefik.enable=true"

      # Catch every request that starts with /api
      - "traefik.http.routers.api.rule=Host(`kaucrow.com`) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=certresolver"

      # Strip "/api" off the front of every path
      - "traefik.http.middlewares.api-strip.stripprefix.prefixes=/api"
      - "traefik.http.routers.api.middlewares=api-strip"

      # Forward the stripped request to the app port
      - "traefik.http.services.api.loadbalancer.server.port=8080"

  postgres:
    image: postgres:18-alpine
    container_name: hexum-postgres-1
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - internal-network

  redis:
    image: redis:alpine
    container_name: hexum-redis-1
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - internal-network

networks:
  web-network:
    external: true  # Use the Traefik bridge
  internal-network:
    driver: bridge  # Private local virtual network bridge